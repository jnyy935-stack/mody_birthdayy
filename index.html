<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Mody</title>

<style>

body{
margin:0;
padding:0;
background:black;
overflow:hidden;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
text-align:center;
}

.container{
padding:20px;
}

h1{
font-size:55px;
color:#ff4d6d;
}

p{
font-size:22px;
line-height:1.8;
}

button{
padding:15px 30px;
border:none;
border-radius:30px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

button:hover{
transform:scale(1.1);
transition:0.3s;
}

.hidden{
display:none;
margin-top:20px;
}

#counter{
margin-top:20px;
font-size:24px;
color:#ffd6de;
}

.heart{
position:absolute;
font-size:20px;
color:#ff4d6d;
animation:float 6s linear infinite;
}

@keyframes float{

from{
transform:translateY(100vh);
opacity:1;
}

to{
transform:translateY(-10vh);
opacity:0;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Happy Birthday Mody 🎂</h1>

<p>
Every moment with you feels special ❤️
</p>

<h2 id="counter"></h2>

<button onclick="showMessage()">
Open My Heart ❤️
</button>

<div class="hidden" id="message">

<p>
You are the best thing that ever happened to me 💕 <br><br>

Since 1/4/2026 everything became better with you ✨ <br><br>

Happy Birthday My Love 🎉
</p>

</div>

</div>

<script>

function showMessage(){

document.getElementById("message").style.display="block";

}

const startDate = new Date("2026-04-01");

function updateCounter(){

const now = new Date();

const diff = now - startDate;

const days = Math.floor(diff / (1000*60*60*24));

document.getElementById("counter").innerHTML =
`Since 1/4/2026 💕 <br> ${days} days together`;

}

updateCounter();

function createHeart(){

const heart=document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(Math.random()*3+3)+"s";

document.body.appendChild(heart);

setTimeout(()=>{

heart.remove();

},6000);

}

setInterval(createHeart,300);

</script>

</body>
</html>
